<body>

    <h1>Disease Outbreak Dashboard</h1>

    <p>Track and predict disease outbreaks using public health data.</p>

    <label for="disease">Select a disease:</label>

    <select id="disease">
        <option>COVID-19</option>
        <option>Influenza</option>
        <option>RSV</option>
        <option>Lyme Disease</option>
    </select>

    <h2 id="selectedDisease">Selected Disease: COVID-19</h2>
        <div class="dashboard-card">
        <h3>Current Trend</h3>
        <p id="trendText">COVID-19 cases are currently stable.</p>
    </div>
    <div class="dashboard-card">
    <h3>Outbreak Statistics</h3>

    <p id="cases">Cases: 12,450</p>
    <p id="risk">Risk Level: Medium</p>
</div>
<div class="dashboard-card">
    <h3>Monthly Case Trend</h3>
    <canvas id="caseChart"></canvas>
</div>
<div class="dashboard-card">
    <h3>U.S. Lyme Disease Map - 2023</h3>
    <div id="usMap" style="height:600px;"></div>
</div>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
